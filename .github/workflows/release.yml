name: Build neovim-latest for Debian

on:
  workflow_dispatch:
    inputs:
      neovim_version:
        description: The version of Neovim to build (e.g. 0.12.4).
        type: string
        required: true
      build_version:
        description: The build (packaging) version.
        type: string
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build binary packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate upstream license permits redistribution
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./validate_license.sh ${{ inputs.neovim_version }}

      - name: Build .deb packages
        run: ./build_neovim_debian.sh ${{ inputs.neovim_version }} ${{ inputs.build_version }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: out/*.deb

  build-ubuntu:
    name: Build Ubuntu binary packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate upstream license permits redistribution
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./validate_license.sh ${{ inputs.neovim_version }}

      - name: Build .deb packages
        run: ./build_neovim_ubuntu.sh ${{ inputs.neovim_version }} ${{ inputs.build_version }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-ubuntu
          path: out/*_ubu.deb

  build-src:
    name: Build source packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.neovim_version }} ${{ inputs.build_version }}

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            neovim-latest_*.dsc
            neovim-latest_*.orig.tar.gz
            neovim-latest_*.debian.tar.xz

  release:
    name: Release neovim-latest for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build, build-ubuntu, build-src]
    steps:
      - name: Download Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Download Ubuntu Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact-ubuntu

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            neovim-latest*.deb
            neovim-latest_*.dsc
            neovim-latest_*.orig.tar.gz
            neovim-latest_*.debian.tar.xz
          name: ${{ inputs.neovim_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.neovim_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
